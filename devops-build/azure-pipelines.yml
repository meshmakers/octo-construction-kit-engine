name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - main
  tags:
    exclude:
      - '*'
  
variables:
- group: ApiKeys-mm-cloud
- group: OctoDefault
- name: artifactsFrameworkVersion
  value: 'net9.0'  
- name: buildConfiguration
  value: 'Release'
- name: buildPlatform
  value: 'Any CPU'
- name: isRelease
  value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
- name: isMain
  value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}

stages:
 - stage: Build
   jobs:
    - job: buildAndTest
      displayName: "Build nuget and execute tests"
      pool:
        name: meshmakers-infra
      steps:
      - template: update-build-number.yml
      - checkout: self
        clean: true
      - template: set-version.yml
      - task: DotNetCoreCLI@2
        displayName: 'Build src'
        inputs:
          command: 'build'
          projects: |
            src/**/*.csproj
            !src/**/Generated*.csproj
          arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
      - task: DotNetCoreCLI@2
        displayName: 'Build samples'
        inputs:
          command: 'build'
          projects:  'samples/**/*.csproj'
          arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'          
      - task: DotNetCoreCLI@2
        displayName: 'Test'
        inputs:
          command: 'test'
          arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
          projects: |
            **/*Tests.csproj
            !**/*SystemTests.csproj
          testRunTitle: 'CI'

      - template: build-and-push-docker-image.yml
        parameters:
          ContainerRegistry: $(DockerRegistryPublicConnection)
          Repository: meshmakers/octo-schema-provider
          Dockerfile: src/ConstructionKit.SchemaProvider/Dockerfile
          PrivateRegistry: $(DockerRegistryPrivateUri)
      - task: PowerShell@2
        inputs:
          filePath: '$(System.DefaultWorkingDirectory)/devops-build/createDocumentation.ps1'
          arguments: '-configuration $(buildConfiguration) -frameworkVersion $(artifactsFrameworkVersion)'
        displayName: 'Create api documentation'
      - template: handle-artifacts.yml
        parameters:
          constructionKitLibraryPaths:
            - 'bin/$(buildConfiguration)/$(artifactsFrameworkVersion)/octo-ck-libraries/SystemCkModel'       
          apiDocumentationPaths:
            - '$(Build.SourcesDirectory)/bin/$(buildConfiguration)/$(artifactsFrameworkVersion)/documentation'
      - template: push-nuget-package.yml             
