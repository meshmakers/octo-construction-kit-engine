name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)

trigger:
  batch: true
  tags:
    include:
      - 'r*'
  branches:
    include:
      - dev/*
      - main

variables:
  buildConfiguration: 'Release'
  isRelease: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/r')]
  MajorVersion: 0
  MinorVersion: 0

stages:
 - stage: Build
   jobs:
    - job: buildAndTest
      displayName: "Build nuget and execute tests"
      pool:
        name: Gerald-Local-Linux
      steps:
      - task: PowerShell@2
        inputs:
          targetType: 'inline'
          script: |
            Write-Host "Source Branch $(Build.SourceBranch)"
            Write-Host "Source Branch Name $(Build.SourceBranchName)"
            $branch = '$(Build.SourceBranch)'
            $branchName = '$(Build.SourceBranchName)'
            $buildNumberShort = '$(Build.BuildNumber)'
            if ($branch.StartsWith("refs/tags/r")) {
              $major = [int]$branchName.Split(".")[0].substring(1)
              $minor = [int]$branchName.Split(".")[1]
              $revision = [int]$branchName.Split(".")[2]
              $buildNumber = "$major.$minor.$revision.0"
              $buildNumberShort = "$major.$minor.$revision"
              Write-Host "##vso[task.setvariable variable=MajorVersion;]$major"
              Write-Host "##vso[task.setvariable variable=MinorVersion;]$minor"
              Write-Host "##vso[task.setvariable variable=BuildNumberShort;]$buildNumberShort"
              Write-Host "Setting build number to $buildNumber"
              Write-Host "##vso[build.updatebuildnumber]$buildNumber"
            }
            Write-Host "Setting build number shot to $buildNumberShort"
            Write-Host "##vso[task.setvariable variable=BuildNumberShort;]$buildNumberShort"
        displayName: 'Set build number'
      - checkout: self
        clean: true
        submodules: true
      - template: setversion.yml
      - task: DotNetCoreCLI@2
        displayName: 'Build src'
        inputs:
          command: 'build'
          projects: |
            src/**/*.csproj
            !src/**/Generated*.csproj
          arguments: '--configuration $(buildConfiguration)'
      - task: DotNetCoreCLI@2
        displayName: 'Build samples'
        inputs:
          command: 'build'
          projects:  'samples/**/*.csproj'
          arguments: '--configuration $(buildConfiguration)'          
      - task: DotNetCoreCLI@2
        displayName: 'Test'
        inputs:
          command: 'test'
          arguments: '--configuration $(buildConfiguration)'
          projects: |
            **/*Tests.csproj
            !**/*SystemTests.csproj
          testRunTitle: 'CI'
      - task: PowerShell@2
        inputs:
          filePath: '$(System.DefaultWorkingDirectory)/devops-build/createDocumentation.ps1'
          arguments: '-configuration $(buildConfiguration)'
        displayName: 'Create documentation'          
      - task: PublishSymbols@2
        displayName: Publish symbols path
        continueOnError: True
        inputs:
          SearchPattern: '**\bin\**\*.pdb'
          PublishSymbols: false
          SymbolServerType: TeamServices
      - task: CopyFiles@2
        displayName: 'Copy Files from **/*.nupkg to $(build.artifactstagingdirectory)'
        inputs:
          SourceFolder: $(Build.SourcesDirectory)
          Contents: |
            **/*.nupkg
            bin/**/documentation/**/*.*
          TargetFolder: $(build.artifactstagingdirectory)
      - task: PowerShell@2
        displayName: 'Create versioninfo file'
        inputs:
          targetType: 'inline'
          script: |
              New-Item $(build.artifactstagingdirectory)/versioninfo.txt
              Set-Content $(build.artifactstagingdirectory)/versioninfo.txt $(Build.BuildNumber)
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: local'
        inputs:
          ArtifactName: local
      - task: DotNetCoreCLI@2
        displayName: Push Nuget Package
        condition: eq(variables.isRelease, true)
        inputs:
          command: custom
          custom: nuget
          arguments: >
             push $(Build.ArtifactStagingDirectory)/**/*.nupkg
             -s https://api.nuget.org/v3/index.json
             -k $(NuGetApiKey)           
