"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: Archive.TargetCkTypeId
    description: "Construction Kit type ID that this archive captures time-series data for."
    valueType: String
  - id: Archive.Columns
    description: "Set of columns (attribute paths) the archive captures. At least one column is required."
    valueType: RecordArray
    valueCkRecordId: ${this}/CkArchiveColumn
  - id: Archive.Status
    description: "Lifecycle status of the archive. Defaults to Created."
    valueType: Enum
    valueCkEnumId: ${this}/CkArchiveStatus
    defaultValues:
      - 0
  - id: Archive.RawRetentionMs
    description: "Retention window for raw data points in milliseconds. When set, the partition pruner may drop source partitions older than (now - RawRetentionMs), but never ahead of the slowest attached rollup's watermark. Null means keep forever."
    valueType: Int
  # ---------- CkArchiveColumn (record stays Ck-prefixed in Phase 2; renamed in Phase 2.5) ----
  - id: CkArchiveColumn.Path
    description: "Attribute path captured by this column. Supports nested record traversal (e.g. 'sensor.reading.value') and array projection (e.g. 'readings[*].value')."
    valueType: String
  - id: CkArchiveColumn.Required
    description: "When true, every insert must supply a non-null value for this path; missing values cause an exception. When false, missing values are stored as NULL and preserved across upserts via COALESCE."
    valueType: Boolean
  - id: CkArchiveColumn.Indexed
    description: "When true (default), the generated CrateDB column is indexed by the standard rules; when false, the column is created with INDEX OFF. Disable only for columns that are read but never filtered."
    valueType: Boolean
    defaultValues:
      - true
  - id: CkArchiveColumn.Name
    description: "Explicit output column name. For a computed column this is the formula-referenceable identifier and is required; for an ingested column it is optional and the name is derived from Path."
    valueType: String
  - id: CkArchiveColumn.Formula
    description: "When set, this is a computed column: an mXparser formula referencing one or more other columns of the same row by name (e.g. 'activePower / apparentPower'). Mutually exclusive with Path. See the Formula Expressions reference for the supported language."
    valueType: String
  - id: CkArchiveColumn.ResultType
    description: "Declared output type a computed column's formula result is cast back to. Required for computed columns, null for ingested columns."
    valueType: Enum
    valueCkEnumId: ${this}/CkComputedColumnResultType
  - id: CkArchiveColumn.ComputedState
    description: "Engine-managed lifecycle state of a computed column (Pending / Backfilling / Active / Failed). Null for ingested columns."
    valueType: Enum
    valueCkEnumId: ${this}/CkComputedColumnState
