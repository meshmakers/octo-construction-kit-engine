"$schema": "https://schemas.meshmakers.cloud/construction-kit-meta.schema.json"
modelId: System.StreamData-1.6.7
description: "StreamData model. Defines the abstract Archive base, RawArchive (instant measurements), RollupArchive (derived bucketed-aggregation archives), TimeRangeArchive (externally pre-aggregated [from, to) windowed data), and supporting enum/record types. 1.1.0 → 1.2.0 renamed CkArchive → Archive (abstract) + introduced RawArchive; 1.2.0 → 1.3.0 adds TimeRangeArchive (additive, no entity migration needed); 1.3.0 → 1.4.0 adds RollupArchive.BucketAlignment + the BucketAlignment enum so monthly / weekly / yearly rollups are expressible (additive, pre-1.4.0 entities resolve to FixedSize); 1.4.0 → 1.5.0 adds computed columns on CkArchiveColumn (Name + Formula + ResultType + ComputedState) and the CkComputedColumnResultType / CkComputedColumnState enums (additive, pre-1.5.0 columns have null computed fields); 1.5.0 → 1.6.0 adds the optimistic recompute model (AB#4184): Archive dirty-tracking + observability attributes (DirtyWindows, PendingRecomputeRanges, RecomputeInProgress, Last* fields, all runtime-state), the CkArchiveDirtyWindow / CkArchiveRecomputeRange records, the RecomputeJob history entity, and the CkRecomputeChangeKind / CkRecomputeChangeSource / CkRecomputeJobState / CkRecomputeTrigger enums (additive, pre-1.6.0 entities have null/empty recompute state); 1.6.0 → 1.6.1 adds CkArchiveColumn.ComputedVersion (AB#4189 Phase 7) — the engine-managed physical-column version pointer that lets a computed column's formula change on an active archive via a versioned physical column ({base}__v{N}) + atomic pointer flip, and marks CkArchiveColumn.ComputedState runtime-state too (additive, pre-1.6.1 computed columns are version 0); 1.6.1 → 1.6.2 adds CkArchiveColumn.PendingFormula (AB#4189 Phase 7) — the transient in-progress marker for a formula change that drives the ingest dual-write and is cleared on the atomic swap (additive, null in steady state); 1.6.2 → 1.6.3 widens RollupArchive.BucketSizeMs and RollupArchive.WatermarkLagMs from Int32 to Int64 (AB#4281) so calendar-month (2,419,200,000 ms) and calendar-year (31,536,000,000 ms) bucket widths — which exceed Int32.MaxValue ≈ 24.85 days — persist as numbers instead of being coerced to strings on ImportRt (additive value-type widening; existing Int32 values still load as Int64, no data migration required); 1.6.3 → 1.6.4 adds RollupArchive.ReferenceTimeZone (AB#4290) — an optional IANA time-zone id that makes calendar (day/week/month/year) bucket boundaries DST-correct in a reference zone instead of UTC; used by the resolution-aware series resolver's grain probe (additive, null keeps the pre-1.6.4 UTC behaviour, no data migration required); 1.6.4 → 1.6.5 adds the TimeWeightedAvg value to CkRollupFunction and RollupArchive.CarryLookbackMs (AB#4336) — time-weighted (LOCF) aggregation for event-based archives, stored as an integral/covered-duration column pair; CarryLookbackMs bounds the per-bucket carry-in scan (additive, null falls back to the 35-day engine default, no data migration required); 1.6.5 → 1.6.6 adds the StateDuration value to CkRollupFunction and CkRollupAggregation.ComparisonValue (AB#4336) — absolute time-in-state per bucket for event-based signals, materialised as a single BIGINT milliseconds column with the same LOCF carry as TimeWeightedAvg (additive, ComparisonValue null on existing aggregations, no data migration required); 1.6.6 → 1.6.7 adds the First and Last values to CkRollupFunction (AB#4188) — first/last observed value per bucket (arg_min / arg_max over time), each materialised as a single DOUBLE PRECISION column; chained rollups pick the child bucket with the smallest / largest window boundary and numeric source columns are required (additive, no data migration required). Loaded only when StreamData is enabled at the instance level."
dependencies:
  - System-[2.1,3.0)
