$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
  - recordId: CkArchiveColumn
    description: "Single column definition inside a CkArchive. Either an ingested column (Path set) or a computed column (Formula set): a formula referencing other columns of the same row by name, producing a typed value."
    attributes:
      - id: ${this}/CkArchiveColumn.Path
        name: Path
      - id: ${this}/CkArchiveColumn.Required
        name: Required
      - id: ${this}/CkArchiveColumn.Indexed
        name: Indexed
      - id: ${this}/CkArchiveColumn.Name
        name: Name
      - id: ${this}/CkArchiveColumn.Formula
        name: Formula
      - id: ${this}/CkArchiveColumn.ResultType
        name: ResultType
      - id: ${this}/CkArchiveColumn.ComputedState
        name: ComputedState
