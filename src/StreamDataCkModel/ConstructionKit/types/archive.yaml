"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Archive
    description: "Abstract base for a CrateDB-backed time-series archive. Concrete subtypes: RawArchive (instant measurements with a single timestamp), RollupArchive (system-orchestrated bucket aggregations of another archive), TimeRangeArchive (externally aggregated values with [from, to) windows — added in a later concept). Shared attributes: TargetCkTypeId, Columns, Status, optional RawRetentionMs. Subtypes add their own time-axis semantics."
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${this}/Archive.TargetCkTypeId
        name: TargetCkTypeId
      - id: ${this}/Archive.Columns
        name: Columns
      - id: ${this}/Archive.Status
        name: Status
      - id: ${this}/Archive.RawRetentionMs
        name: RawRetentionMs
        isOptional: true
      # ---------- Recompute dirty-tracking + observability (AB#4184) ----------
      - id: ${this}/Archive.DirtyWindows
        name: DirtyWindows
        isOptional: true
      - id: ${this}/Archive.PendingRecomputeRanges
        name: PendingRecomputeRanges
        isOptional: true
      - id: ${this}/Archive.RecomputeInProgress
        name: RecomputeInProgress
      - id: ${this}/Archive.LastRecomputeStartedAt
        name: LastRecomputeStartedAt
        isOptional: true
      - id: ${this}/Archive.LastRecomputeSuccessAt
        name: LastRecomputeSuccessAt
        isOptional: true
      - id: ${this}/Archive.LastRecomputeFailureAt
        name: LastRecomputeFailureAt
        isOptional: true
      - id: ${this}/Archive.LastRecomputeFailureReason
        name: LastRecomputeFailureReason
        isOptional: true
