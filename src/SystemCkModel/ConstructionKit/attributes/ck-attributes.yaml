"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: Name
    valueType: String
  - id: DisplayName
    valueType: String
  - id: Description
    valueType: String
    description: Further information on the item.
  - id: Enabled
    valueType: Boolean
  - id: TenantId
    valueType: String
  - id: ParentTenantId
    valueType: String
  - id: DatabaseName
    valueType: String
  - id: AutoIncrement.Start
    valueType: Int
  - id: AutoIncrement.End
    valueType: Int
  - id: AutoIncrement.CurrentValue
    valueType: Int
  - id: ConfigurationValue
    valueType: String
    
  - id: Query.Columns
    valueType: StringArray
  - id: Query.CkTypeId
    valueType: String
  - id: Query.Sorting
    valueType: RecordArray
    valueCkRecordId: ${thisModel}/SortOrderItem
  - id: Query.FieldFilter
    valueType: RecordArray
    valueCkRecordId: ${thisModel}/FieldFilter
  - id: Query.TextSearchFilter
    valueType: Record
    valueCkRecordId: ${thisModel}/TextSearchFilter
  - id: Query.AttributeSearchFilter
    valueType: Record
    valueCkRecordId: ${thisModel}/AttributeSearchFilter
    
  - id: ReferencedAttributeName
    valueType: String
  - id: ReferencedAttributeNames
    valueType: StringArray    
  - id: FieldFilter.Operator
    valueType: Enum
    valueCkEnumId: ${thisModel}/FieldFilterOperator
  - id: ComparisonValue
    valueType: String
  - id: SortOrder
    valueType: Enum
    valueCkEnumId: ${thisModel}/SortOrders