"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: Query.Columns
    valueType: StringArray
  - id: Query.GroupByColumns
    valueType: StringArray
  - id: Query.CkTypeId
    valueType: String
  - id: Query.Sorting
    valueType: RecordArray
    valueCkRecordId: ${this}/SortOrderItem
  - id: Query.FieldFilter
    valueType: RecordArray
    valueCkRecordId: ${this}/FieldFilter
  - id: Query.TextSearchFilter
    valueType: Record
    valueCkRecordId: ${this}/TextSearchFilter
  - id: Query.AttributeSearchFilter
    valueType: Record
    valueCkRecordId: ${this}/AttributeSearchFilter
  - id: AttributePath
    valueType: String
  - id: AttributePaths
    valueType: StringArray    
  - id: FieldFilter.Operator
    valueType: Enum
    valueCkEnumId: ${this}/FieldFilterOperator
  - id: ComparisonValue
    valueType: String
  - id: SortOrder
    valueType: Enum
    valueCkEnumId: ${this}/SortOrders
  - id: AggregationType
    valueType: Enum
    valueCkEnumId: ${this}/AggregationTypes
  - id: AggregationQueryColumn
    valueType: Record
    valueCkRecordId: ${this}/AggregationQueryColumn