$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
records:
- recordId: FieldFilter
  description: "Defines a filter condition for a specific attribute with an operator and comparison value."
  attributes:
    - id: ${this}/AttributePath
      name: AttributePath
    - id: ${this}/FieldFilter.Operator
      name: Operator
    - id: ${this}/ComparisonValue
      name: ComparisonValue
      isOptional: true