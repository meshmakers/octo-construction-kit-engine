"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Entity
    isFinal: false
    isAbstract: true
    associations:
    - id: ${this}/Related
      targetCkTypeId: ${this}/Entity
    indexes:
      - indexType: "Ascending"
        fields:
          - attributePaths:
              - RtWellKnownName
      - indexType: "Ascending"
        fields:
          - attributePaths:
              - CkTypeId
              - _id