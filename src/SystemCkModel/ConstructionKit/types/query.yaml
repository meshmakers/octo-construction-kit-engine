"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: PersistentQuery
    description: "Abstract base type for all query types. Defines common query properties like name, description, and target type."
    derivedFromCkTypeId: ${this}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${this}/Name
        name: Name
      - id: ${this}/Description
        name: Description
        isOptional: true
      - id: ${this}/Query.CkTypeId
        name: QueryCkTypeId
      - id: ${this}/Query.NavigationFilterMode
        name: NavigationFilterMode
        isOptional: true
  - typeId: SimpleRtQuery
    description: "Query type for retrieving rows/tuples from entities with support for column selection, sorting, and filtering."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.Columns
        name: Columns
      - id: ${this}/Query.Sorting
        name: Sorting
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: AggregationRtQuery
    description: "Query type for performing aggregation operations (Count, Min, Max, Avg, Sum) on entity data without grouping."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: GroupingAggregationRtQuery
    description: "Query type for performing grouped aggregation operations with GROUP BY functionality on entity data."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.GroupByColumns
        name: GroupingColumns
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: StreamDataQuery
    description: "Abstract base for stream-data query types. Carries the common time-range, limit, rtId scope, and field-filter attributes shared by all concrete SdQuery subtypes."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${this}/StreamDataQuery.RtIds
        name: RtIds
        isOptional: true
      - id: ${this}/StreamDataQuery.From
        name: From
        isOptional: true
      - id: ${this}/StreamDataQuery.To
        name: To
        isOptional: true
      - id: ${this}/StreamDataQuery.Limit
        name: Limit
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
  - typeId: SimpleSdQuery
    description: "Persistent stream-data query that retrieves time-series rows for a given CK type with optional column projection, sorting, and field filters."
    derivedFromCkTypeId: ${this}/StreamDataQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/StreamDataQuery.Columns
        name: Columns
      - id: ${this}/Query.Sorting
        name: Sorting
        isOptional: true
  - typeId: AggregationSdQuery
    description: "Persistent stream-data query that performs aggregation operations (Count, Min, Max, Avg, Sum) on time-series data without grouping."
    derivedFromCkTypeId: ${this}/StreamDataQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns
  - typeId: GroupingAggregationSdQuery
    description: "Persistent stream-data query that performs grouped aggregation with GROUP BY functionality on time-series data."
    derivedFromCkTypeId: ${this}/StreamDataQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.GroupByColumns
        name: GroupingColumns
      - id: ${this}/AggregationQueryColumns
        name: Columns
  - typeId: DownsamplingSdQuery
    description: "Persistent stream-data query that downsamples time-series data using DATE_BIN bucketing with per-column aggregation (AVG, MIN, MAX). From, To, and Limit (bucket count) are required at the API level even though the schema marks them optional on the base."
    derivedFromCkTypeId: ${this}/StreamDataQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns