"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: PersistentQuery
    description: "Abstract base type for all query types. Defines common query properties like name, description, and target type."
    derivedFromCkTypeId: ${this}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${this}/Name
        name: Name
      - id: ${this}/Description
        name: Description
        isOptional: true
      - id: ${this}/Query.CkTypeId
        name: QueryCkTypeId
      - id: ${this}/Query.NavigationFilterMode
        name: NavigationFilterMode
        isOptional: true
  - typeId: SimpleRtQuery
    description: "Query type for retrieving rows/tuples from entities with support for column selection, sorting, and filtering."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.Columns
        name: Columns
      - id: ${this}/Query.Sorting
        name: Sorting
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: AggregationRtQuery
    description: "Query type for performing aggregation operations (Count, Min, Max, Avg, Sum) on entity data without grouping."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: GroupingAggregationRtQuery
    description: "Query type for performing grouped aggregation operations with GROUP BY functionality on entity data."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.GroupByColumns
        name: GroupingColumns
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${this}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${this}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
  - typeId: StreamDataSimpleQuery
    description: "Persistent query that retrieves time-series stream data from CrateDB for a given CK type with optional RtIds scope, time filtering, and field filters."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/StreamDataQuery.Columns
        name: Columns
      - id: ${this}/StreamDataQuery.RtIds
        name: RtIds
        isOptional: true
      - id: ${this}/StreamDataQuery.From
        name: From
        isOptional: true
      - id: ${this}/StreamDataQuery.To
        name: To
        isOptional: true
      - id: ${this}/StreamDataQuery.Limit
        name: Limit
        isOptional: true
      - id: ${this}/Query.Sorting
        name: Sorting
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
  - typeId: StreamDataAggregationQuery
    description: "Persistent query that performs aggregation operations (Count, Min, Max, Avg, Sum) on time-series stream data from CrateDB without grouping."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/StreamDataQuery.RtIds
        name: RtIds
        isOptional: true
      - id: ${this}/StreamDataQuery.From
        name: From
        isOptional: true
      - id: ${this}/StreamDataQuery.To
        name: To
        isOptional: true
      - id: ${this}/StreamDataQuery.Limit
        name: Limit
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
  - typeId: StreamDataGroupingAggregationQuery
    description: "Persistent query that performs grouped aggregation operations with GROUP BY functionality on time-series stream data from CrateDB."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/Query.GroupByColumns
        name: GroupingColumns
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/StreamDataQuery.RtIds
        name: RtIds
        isOptional: true
      - id: ${this}/StreamDataQuery.From
        name: From
        isOptional: true
      - id: ${this}/StreamDataQuery.To
        name: To
        isOptional: true
      - id: ${this}/StreamDataQuery.Limit
        name: Limit
        isOptional: true
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
  - typeId: StreamDataDownsamplingQuery
    description: "Persistent query that downsamples time-series stream data from CrateDB using DATE_BIN bucketing with per-column aggregation (AVG, MIN, MAX). Requires From, To, and Limit (bucket count)."
    derivedFromCkTypeId: ${this}/PersistentQuery
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/AggregationQueryColumns
        name: Columns
      - id: ${this}/StreamDataQuery.RtIds
        name: RtIds
        isOptional: true
      - id: ${this}/StreamDataQuery.From
        name: From
      - id: ${this}/StreamDataQuery.To
        name: To
      - id: ${this}/StreamDataQuery.Limit
        name: Limit
      - id: ${this}/Query.FieldFilter
        name: FieldFilter
        isOptional: true