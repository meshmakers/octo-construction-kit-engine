"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Query
    derivedFromCkTypeId: ${thisModel}/Entity
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${thisModel}/Query.CkTypeId
        name: QueryCkTypeId
      - id: ${thisModel}/Query.Types
        name: QueryType
      - id: ${thisModel}/Query.Columns
        name: Columns
      - id: ${thisModel}/Query.Sorting
        name: Sorting
        isOptional: true
      - id: ${thisModel}/Query.FieldFilter
        name: FieldFilter
        isOptional: true
      - id: ${thisModel}/Query.TextSearchFilter
        name: TextSearchFilter
        isOptional: true
      - id: ${thisModel}/Query.AttributeSearchFilter
        name: AttributeSearchFilter
        isOptional: true
      - id: ${thisModel}/Name
        name: Name