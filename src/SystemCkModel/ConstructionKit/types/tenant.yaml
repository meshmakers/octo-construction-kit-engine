"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Tenant
    derivedFromCkTypeId: ${thisModel}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${thisModel}/TenantId
        name: TenantId
      - id: ${thisModel}/ParentTenantId
        name: ParentTenantId
        isOptional: true
      - id: ${thisModel}/DatabaseName
        name: DatabaseName
    indexes:
      - indexType: Ascending
        fields:
          - attributeNames:
              - TenantId
