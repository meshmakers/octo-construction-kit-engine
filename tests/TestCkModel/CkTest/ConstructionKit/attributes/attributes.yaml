"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: Designation
    valueType: String
  - id: Location
    valueType: String
  - id: ConnectionState
    valueType: Enum
    valueCkEnumId: Test/ConnectionState
  - id: DataCount
    valueType: Int
  - id: LocationX
    valueType: Double
  - id: IsEnabled
    valueType: Boolean
    defaultValues:
      - true   
  - id: StringArrayTests
    valueType: StringArray
    defaultValues:
      - "a"
  - id: IntArrayTests
    valueType: IntArray
    defaultValues:
      - 6
  - id: RecordArrayTests
    valueType: RecordArray
    valueCkRecordId: Test/TestRecord

  - id: RecordTest
    valueType: Record
    valueCkRecordId: Test/TestRecord

  - id: Binary
    valueType: BinaryLinked
