"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Location-2
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${System}/Name
        name: Name
      - id: ${System}/Description
        name: Description
  - typeId: Location
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${this}/Designation
        name: Designation

  - typeId: LocationWithSensor
    derivedFromCkTypeId: ${this}/Location
    isFinal: false
    isAbstract: true

  - typeId: Continent
    derivedFromCkTypeId: ${this}/Location
    isFinal: true
    isAbstract: false

  - typeId: Continent-2
    derivedFromCkTypeId: ${this}/Location-2
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/RecordTest-2
        name: RecordTest2
      - id: ${this}/ConnectionState-2
        name: ConnectionState2

  - typeId: Ocean
    derivedFromCkTypeId: ${this}/Location
    isFinal: true
    isAbstract: false


  - typeId: Country
    derivedFromCkTypeId: ${this}/Location
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/StringArrayTests
        name: StringArrayTests
      - id: ${this}/IntArrayTests
        name: IntArrayTests
      - id: ${this}/RecordArrayTests
        name: RecordArrayTests
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/Continent
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/Ocean

  - typeId: Region
    derivedFromCkTypeId: ${this}/LocationWithSensor
    isFinal: true
    isAbstract: false
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/Country

  - typeId: City
    derivedFromCkTypeId: ${this}/Location
    isFinal: true
    isAbstract: false
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/Region

  - typeId: District
    derivedFromCkTypeId: ${this}/LocationWithSensor
    isFinal: true
    isAbstract: false
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/City

  - typeId: Zone
    derivedFromCkTypeId: ${this}/LocationWithSensor
    isFinal: true
    isAbstract: false
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/District

  - typeId: Sensor
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/Designation
        name: Designation
        isOptional: false
      - id: ${this}/ConnectionState
        name: ConnectionState
        isOptional: false
      - id: ${this}/DataCount
        name: DataCount
        isOptional: true
      - id: ${this}/LocationX
        name: LocationX
        isOptional: true
      - id: ${this}/IsEnabled
        name: IsEnabled
      - id: ${this}/RecordTest
        name: RecordTest
        isOptional: true
      - id: ${this}/StringArrayTests
        name: StringArrayTests
        isOptional: true
      - id: ${this}/IntArrayTests
        name: IntArrayTests
        isOptional: true
      - id: ${this}/RecordArrayTests
        name: RecordArrayTests
        isOptional: true
    associations:
      - id: ${System}/ParentChild
        targetCkTypeId: ${this}/LocationWithSensor