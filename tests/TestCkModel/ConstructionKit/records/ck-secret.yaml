"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: Secret
    isFinal: true
    isAbstract: false
    attributes:
      - id: System/Description
        name: Description
        isOptional: true
      - id: ${{ thisModel }}/ExpirationDateTime
        name: ExpirationDateTime
        isOptional: true
      - id: ${{ thisModel }}/Value
        name: Value
        isOptional: true
      - id: ${{ thisModel }}/SecretType
        name: Type
    