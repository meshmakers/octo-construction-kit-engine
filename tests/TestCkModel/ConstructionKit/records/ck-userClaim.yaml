"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserClaim
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${{ thisModel }}/ClaimType
        name: ClaimType
      - id: ${{ thisModel }}/ClaimValue
        name: ClaimValue
      - id: ${{ thisModel }}/UserId
        name: UserId
    