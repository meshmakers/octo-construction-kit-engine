"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserLogin
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${{ thisModel }}/LoginProvider
        name: LoginProvider
      - id: ${{ thisModel }}/ProviderKey
        name: ProviderKey
      - id: ${{ thisModel }}/ProviderDisplayName
        name: ProviderDisplayName
        isOptional: true
      - id: ${{ thisModel }}/UserId
        name: UserId    