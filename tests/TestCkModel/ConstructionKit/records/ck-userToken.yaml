"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserToken
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${thisModel}/LoginProvider
        name: LoginProvider
      - id: System/Name
        name: Name
      - id: ${thisModel}/UserId
        name: UserId
      - id: ${thisModel}/Value
        name: Value
        isOptional: true