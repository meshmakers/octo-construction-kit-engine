"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: ApiResource
    derivedFromCkTypeId: ${{ thisModel }}/Resource
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${{ thisModel }}/RequireResourceIndicator
        name: RequireResourceIndicator
      - id: ${{ thisModel }}/Secrets
        name: ApiSecrets
      - id: ${{ thisModel }}/Scopes
        name: Scopes
      - id: ${{ thisModel }}/AllowedAccessTokenSigningAlgorithms
        name: AllowedAccessTokenSigningAlgorithms        
  