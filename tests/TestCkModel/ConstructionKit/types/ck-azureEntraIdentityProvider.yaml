"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: AzureEntraIdentityProvider
    derivedFromCkTypeId: ${this}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/TenantId
        name: TenantId

      - id: ${this}/Authority
        name: Authority

      - id: ${this}/ClientId
        name: ClientIdGroupGraphApi

      - id: ${this}/ClientIdGroupAzureAd
        name: ClientIdGroupAzureAd

      - id: ${this}/ClientSecret
        name: ClientSecretGroupAzureAd
