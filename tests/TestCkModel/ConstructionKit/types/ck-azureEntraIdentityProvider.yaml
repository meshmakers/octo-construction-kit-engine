"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: AzureEntraIdentityProvider
    derivedFromCkTypeId: ${thisModel}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/TenantId
        name: TenantId

      - id: ${thisModel}/Authority
        name: Authority

      - id: ${thisModel}/ClientId
        name: ClientIdGroupGraphApi

      - id: ${thisModel}/ClientIdGroupAzureAd
        name: ClientIdGroupAzureAd

      - id: ${thisModel}/ClientSecret
        name: ClientSecretGroupAzureAd
