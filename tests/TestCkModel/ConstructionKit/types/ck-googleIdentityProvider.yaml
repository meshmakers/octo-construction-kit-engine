"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: GoogleIdentityProvider
    derivedFromCkTypeId: ${{ thisModel }}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${{ thisModel }}/ClientId
        name: ClientId

      - id: ${{ thisModel }}/ClientSecret
        name: ClientSecret
