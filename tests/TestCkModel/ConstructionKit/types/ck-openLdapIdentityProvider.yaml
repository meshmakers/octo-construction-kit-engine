    derivedFromCkTypeId: ${thisModel}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${thisModel}/HostAddress
        name: HostAddress
      - id: ${thisModel}/UseTls
        name: UseTls
