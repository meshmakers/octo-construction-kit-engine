"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: PermissionRole
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/Name
        name: Name

      - id: ${thisModel}/RoleId
        name: RoleId

      - id: ${thisModel}/SubjectIds
        name: SubjectIds

      - id: ${thisModel}/IdentityRoleIds
        name: IdentityRoleIds
