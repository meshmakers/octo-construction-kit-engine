"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: PersistedGrant
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${thisModel}/GrantKey
        name: GrantKey

      - id: ${thisModel}/GrantType
        name: GrantType

      - id: ${thisModel}/SubjectId
        name: SubjectId

      - id: ${thisModel}/SessionId
        name: SessionId

      - id: ${thisModel}/ClientId
        name: ClientId

      - id: ${System}/Description
        name: Description

      - id: ${thisModel}/CreationDateTime
        name: CreationDateTime

      - id: ${thisModel}/ExpirationDateTime
        name: ExpirationDateTime
        isOptional: true

      - id: ${thisModel}/ConsumedDateTime
        name: ConsumedDateTime
        isOptional: true

      - id: ${thisModel}/Data
        name: Data