"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Role
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/Name
        name: Name
        isOptional: true

      - id: ${thisModel}/NormalizedName
        name: NormalizedName
        isOptional: true

      - id: ${thisModel}/ConcurrencyStamp
        name: ConcurrencyStamp

      - id: ${thisModel}/SubjectIds
        name: SubjectIds

      - id: ${thisModel}/IdentityRoleIds
        name: IdentityRoleIds

      - id: ${thisModel}/RoleClaims
        name: Claims
        isOptional: true