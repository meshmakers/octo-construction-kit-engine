"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: User
    derivedFromCkTypeId: System/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${thisModel}/UserName
        name: UserName
        isOptional: true

      - id: ${thisModel}/NormalizedUserName
        name: NormalizedUserName
        isOptional: true

      - id: ${thisModel}/FirstName
        name: FirstName
        isOptional: true

      - id: ${thisModel}/LastName
        name: LastName
        isOptional: true

      - id: System/Description
        name: Description
        isOptional: true

      - id: ${thisModel}/Email
        name: Email
        isOptional: true

      - id: ${thisModel}/NormalizedEmail
        name: NormalizedEmail
        isOptional: true

      - id: ${thisModel}/EmailConfirmed
        name: EmailConfirmed

      - id: ${thisModel}/PasswordHash
        name: PasswordHash
        isOptional: true

      - id: ${thisModel}/SecurityStamp
        name: SecurityStamp
        isOptional: true

      - id: ${thisModel}/ConcurrencyStamp
        name: ConcurrencyStamp

      - id: ${thisModel}/PhoneNumber
        name: PhoneNumber
        isOptional: true

      - id: ${thisModel}/PhoneNumberConfirmed
        name: PhoneNumberConfirmed

      - id: ${thisModel}/TwoFactorEnabled
        name: TwoFactorEnabled

      - id: ${thisModel}/LockoutEnd
        name: LockoutEnd
        isOptional: true

      - id: ${thisModel}/LockoutEnabled
        name: LockoutEnabled

      - id: ${thisModel}/AccessFailedCount
        name: AccessFailedCount

      - id: ${thisModel}/ResetPasswordOnLogin
        name: ResetPasswordOnLogin

      - id: ${thisModel}/RoleIds
        name: RoleIds
        isOptional: true

      - id: ${thisModel}/UserClaims
        name: Claims
        isOptional: true

      - id: ${thisModel}/UserLogins
        name: UserLogins
        isOptional: true

      - id: ${thisModel}/UserTokens
        name: UserTokens
        isOptional: true
    
    indexes:
      - indexType: Ascending
        fields:
          - attributePaths:
              - NormalizedEmail
              - NormalizedUserName
